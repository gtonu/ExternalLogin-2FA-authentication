[config]
model = "gpt-4o-mini"
temperature = 0.2
max_tokens = 1500

[pr_reviewer]
enable_review_labels_effort = true
enable_auto_approval = false
extra_instructions = """
Act as a senior .NET backend engineer reviewing this PR who

Maintains:
- Clean architecture
- Industry standard C# and ASP.NET Core syntaxes

Reports only:
- Security issues
- Data consistency issues
- Multi-tenant isolation risks
- Null reference risks
- Performance regressions
- Bugs / logical errors
- Async/await misuse
- Performance issues (EF Core, DB queries)
- code smells
- repetitive dependency bindings

Ignore style, naming, and trivial suggestions.

For each issue:
- Problem
- Impact
- Concrete fix (code if possible)

Output:
- Inline comments per line when applicable
- No praise, no repetition, no diagrams, no summaries

If no critical issues: "No critical issues found."
"""

[github_app]
pr_commands = [
  "/agentic_review"
]

handle_push_trigger = true
push_commands = [
  "/agentic_review"
]

[review_agent]
enabled = true
publish_output = true